<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>健康打卡</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f5f7fb;
}

.card{
  background:#fff;
  max-width:900px;
  margin:auto;
  padding:24px;
  border-radius:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

h2,h3{
  margin-top:0;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}

input,textarea,select{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
}

.summary{
  margin-top:20px;
  background:#f8fafc;
  border-radius:12px;
  padding:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:14px;
}

th,td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}

a{
  color:#2563eb;
}
</style>
</head>

<body>

<div class="card">

<h2>健康打卡</h2>

<div class="grid">

<div>
<label>体重（kg）</label>
<input id="weight" type="number" step="0.1">
</div>

<div>
<label>体脂率（%）</label>
<input id="bodyfat" type="number" step="0.1">
</div>

<div>
<label>今日椭圆机（分钟）</label>
<input id="cardio" type="number">
</div>

<div>
<label>喝水（L）</label>
<input id="water" type="number" step="0.1">
</div>

<div>
<label>今日热量（kcal）</label>
<input id="calories" type="number">
</div>

<div>
<label>补剂</label>
<select id="supplement">
<option>否</option>
<option>是</option>
</select>
</div>

</div>

<br>

<label>今天吃了什么</label>
<textarea id="food"></textarea>

<p>
热量查询：
<a href="https://www.caloriexpert.com/" target="_blank">CalorieExpert</a>
｜
<a href="https://www.foodyze.com/" target="_blank">Foodyze</a>
</p>

<button onclick="saveData()">保存打卡</button>

<div class="summary" id="summary"></div>

<h3>历史记录</h3>

<table>
<thead>
<tr>
<th>日期</th>
<th>体重</th>
<th>体脂</th>
<th>热量</th>
<th>缺口</th>
<th>脂肪变化</th>
<th>水分变化</th>
<th>瘦体重变化</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const age=25
const sex="male"
const height=170

function calcBMR(weight,bodyfat){

  const lean=weight*(1-bodyfat/100)

  return Math.round(
    370 + 21.6*lean
  )
}

function saveData(){

  const weight=Number(weightInput.value)
  const bodyfat=Number(bodyfatInput.value)
  const cardio=Number(cardioInput.value)
  const water=Number(waterInput.value)
  const calories=Number(caloriesInput.value)

  const food=foodInput.value
  const supplement=supplementInput.value

  const bmr=calcBMR(weight,bodyfat)

  const cardioBurn=Math.round(cardio*8)

  const tdee=bmr+cardioBurn

  const deficit=tdee-calories

  let fatDelta="-"
  let waterDelta="-"
  let leanDelta="-"

  const history=
    JSON.parse(localStorage.getItem("healthLogs")) || []

  if(history.length){

    const prev=history[history.length-1]

    const weightDiff=
      weight-prev.weight

    const fatMass=
      weight*bodyfat/100

    const prevFat=
      prev.weight*prev.bodyfat/100

    const fatDiff=
      fatMass-prevFat

    const leanMass=
      weight-fatMass

    const prevLean=
      prev.weight-prevFat

    const leanDiff=
      leanMass-prevLean

    const waterDiff=
      weightDiff-fatDiff-leanDiff

    fatDelta=fatDiff.toFixed(2)
    leanDelta=leanDiff.toFixed(2)
    waterDelta=waterDiff.toFixed(2)
  }

  const data={
    date:new Date().toLocaleDateString(),
    weight,
    bodyfat,
    cardio,
    water,
    calories,
    food,
    supplement,
    deficit,
    fatDelta,
    waterDelta,
    leanDelta
  }

  history.push(data)

  localStorage.setItem(
    "healthLogs",
    JSON.stringify(history)
  )

  render()
}

function render(){

  const history=
   JSON.parse(localStorage.getItem("healthLogs")) || []

  tableBody.innerHTML=""

  if(!history.length)return

  history.forEach(item=>{

    tableBody.innerHTML+=`
      <tr>
      <td>${item.date}</td>
      <td>${item.weight}</td>
      <td>${item.bodyfat}%</td>
      <td>${item.calories}</td>
      <td>${item.deficit}</td>
      <td>${item.fatDelta}</td>
      <td>${item.waterDelta}</td>
      <td>${item.leanDelta}</td>
      </tr>
    `
  })

  const latest=
    history[history.length-1]

  summary.innerHTML=`

    <h3>今日分析</h3>

    基础代谢：
    <b>${calcBMR(latest.weight,latest.bodyfat)}</b> kcal

    <br><br>

    热量缺口：
    <b>${latest.deficit}</b> kcal

    <br><br>

    脂肪变化：
    <b>${latest.fatDelta}</b> kg

    <br>

    水分变化：
    <b>${latest.waterDelta}</b> kg

    <br>

    瘦体重变化：
    <b>${latest.leanDelta}</b> kg

    <br><br>

    今日饮食：
    ${latest.food}

    <br>

    补剂：
    ${latest.supplement}
  `
}

const weightInput=document.getElementById("weight")
const bodyfatInput=document.getElementById("bodyfat")
const cardioInput=document.getElementById("cardio")
const waterInput=document.getElementById("water")
const caloriesInput=document.getElementById("calories")
const foodInput=document.getElementById("food")
const supplementInput=document.getElementById("supplement")
const summary=document.getElementById("summary")
const tableBody=document.getElementById("tableBody")

render()

</script>

</body>
</html>
